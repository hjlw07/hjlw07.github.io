    <h1>Contact Career Guide</h1>
    <p>Have any questions about a certain career? Email!</p>

    <form>
      <!-- PART 1: Contact Information Fieldset -->
      <fieldset>
        <legend>Contact Information</legend>

        <!-- TODO: Add Name Input (see Part 1, Step 1) -->
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required>

        <br><br>

        <!-- TODO: Add Email Input (see Part 1, Step 2) -->
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>
      </fieldset>

      <br>

      <!-- PART 2: Additional Details (see Part 2, Step 3) -->
      <label for="details">Additional Details:</label>
      <br>
      <textarea id="details" name="details" rows="5" cols="40"></textarea>

      <br><br>

      <!-- PART 3: Newsletter Checkbox (see Part 3, Step 1) -->
      <input type="checkbox" id="newsletter" name="newsletter">
      <label for="newsletter">Send me the Career Guide newsletter</label>

      <br><br>

      <p><em>We'll respond within 2 business days.</em></p>

      <!-- PART 3: Submit Button (see Part 3, Step 2) -->
      <button type="submit">Submit</button>
    </form>
